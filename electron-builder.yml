appId: com.snedea.legend-of-obsidian-vault
productName: Legend of the Obsidian Vault
copyright: Copyright 2025

directories:
  output: release

mac:
  category: public.app-category.games
  target:
    - dmg
    - zip
  darkModeSupport: true

dmg:
  title: Legend of the Obsidian Vault
  artifactName: LOV-${version}.${ext}

files:
  - electron/dist/**/*
  - frontend/dist/**/*
  - "!node_modules"
  - "!backend"
  - "!screens"
  - "!saves"
  - "!*.py"

extraResources:
  - from: .
    to: game
    filter:
      - "game_data.py"
      - "obsidian.py"
      - "brainbot.py"
      - "fantasy_translator.py"
      - "simple_cache.py"
      - "backend/**/*.py"
      - "saves/"
      - "demo_vault/"
